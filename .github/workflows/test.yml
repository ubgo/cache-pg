name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      # cache-mem depends on github.com/ubgo/cache-pg. Until that module is
      # tagged, CI checks out the sibling repo so the go.mod replace resolves.
      - name: checkout ubgo/cache-pg sibling
        uses: actions/checkout@v6
        with:
          repository: ubgo/cache-pg
          path: ../cache
      - name: vet
        run: go vet ./...
      - name: test (race + coverage)
        run: go test -race -count=2 -coverprofile=cover.out ./...
